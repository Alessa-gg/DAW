<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Autoguardado</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 1rem;
            background: #e0e7ff;
            color: var(--primary);
        }

        h2 {
            margin: 0 0 1.5rem 0;
            font-size: 1.25rem;
            color: var(--text);
        }

        .campo {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.85rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.9rem;
            box-sizing: border-box;
            
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        #msg-guardado {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 12px;
            text-align: center;
            min-height: 1rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <span id="badge-tipo" class="status-badge">Detectando almacenamiento...</span>
        <h2>Registro de Perfil</h2>

        <form id="formUsuario">
            <div class="campo">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre">
            </div>

            <div class="campo">
                <label for="pais">País</label>
                <select id="pais">
                    <option value="">Seleccione...</option>
                    <option value="Guatemala">Guatemala</option>
                    <option value="El Salvador">El Salvador</option>
                    <option value="Honduras">Honduras</option>
                    <option value="Nicaragua">Nicaragua</option>
                    <option value="Costa Rica">Costa Rica</option>
                    <option value="Panamá">Panamá</option>
                </select>
            </div>

            <div class="campo">
                <label for="biografia">Biografía</label>
                <textarea id="biografia"></textarea>
            </div>

            <button type="submit">Guardar Datos</button>
            <div id="msg-guardado"></div>
        </form>
    </div>

    <!-- Se habilita el que se va a utilizar -->
    <!-- <script src="js/localStorage.js"></script> -->
    <script src="js/sessionStorage.js"></script>

</body>

</html>
